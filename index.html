document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

){\n      for(let i=0;i<26;i++) P.push({x:Math.random()*W,y:Math.random()*H,vy:this.rand(.3,.9),vx:this.rand(-.3,.3),rot:Math.random()*6.28,vr:this.rand(-.02,.02),s:this.rand(5,11),sw:Math.random()*6.28,c:['#7fbf5a','#c9a24a','#d98b3a','#5fa070'][i%4]});\n    } else if(kind==='rain'||kind==='city'){\n      const n = kind==='city'?160:220;\n      for(let i=0;i<n;i++) P.push({x:Math.random()*W,y:Math.random()*H,len:this.rand(10,26),vy:this.rand(9,16),c:kind==='city'?['#ff4d9d','#4dc9ff','#b96bff'][i%3]:null});\n      if(kind==='city'){ this.cars=[]; for(let i=0;i<14;i++) this.cars.push({x:Math.random()*W,y:H*this.rand(.72,.95),vx:this.rand(1.4,3.4)*(Math.random()<.5?1:-1),c:Math.random()<.5?'#ff5a7a':'#ffd36b',w:this.rand(20,46)}); }\n      this.flash=0;\n    } else if(kind==='embers'){\n      for(let i=0;i<70;i++) P.push({x:Math.random()*W,y:this.rand(H*.4,H+40),vy:this.rand(-.6,-1.8),vx:this.rand(-.3,.3),r:this.rand(.6,2.2),life:Math.random(),c:['#ff7a1a','#ff9d3c','#ffcf6b'][i%3],fl:Math.random()*6.28});\n    } else if(kind==='snow'){\n      for(let i=0;i<130;i++) P.push({x:Math.random()*W,y:Math.random()*H,vy:this.rand(.5,1.6),r:this.rand(1,3.2),sw:Math.random()*6.28,sws:this.rand(.5,1.4)});\n    } else if(kind==='sunset'){\n      for(let i=0;i<10;i++) P.push({x:Math.random()*W,y:this.rand(H*.14,H*.5),w:this.rand(160,340),h:this.rand(30,64),vx:this.rand(.1,.35),a:this.rand(.05,.16)});\n    } else if(kind==='minimal'){\n      for(let i=0;i<22;i++) P.push({x:Math.random()*W,y:Math.random()*H,r:this.rand(.5,1.4),vx:this.rand(-.12,.12),vy:this.rand(-.12,.12),a:this.rand(.06,.2)});\n    }\n    this.parts=P;\n  }\n\n  startCanvas(){\n    if(this.reduce){ this.drawFrame(performance.now(), 16); return; }\n    let last=performance.now();\n    const loop=(t)=>{\n      this.raf=requestAnimationFrame(loop);\n      const dt=Math.min(48,t-last); last=t;\n      this.drawFrame(t, dt);\n      this.smoothAnalog(t);\n    };\n    this.raf=requestAnimationFrame(loop);\n  }\n\n  smooth .shoot){ s.x+=s.vx*dt*.06; s.y+=s.vy*dt*.06; s.life-=dt*.0016;\n        ctx.globalAlpha=Math.max(0,s.life); ctx.strokeStyle='#fff'; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-s.vx*6,s.y-s.vy*6); ctx.stroke(); }\n      this.shoot=this.shoot.filter(s=>s.life>0); ctx.globalAlpha=1;\n    }\n\n    else if(kind==='waves'){\n      for(let l=0;l<4;l++){\n        const amp=14+l*10, yBase=H*(.5+l*.11), sp=T*(.5+l*.22)+l;\n        ctx.beginPath(); ctx.moveTo(0,H);\n        for(let x=0;x<=W;x+=14){ const y=yBase+Math.sin(x*0.008+sp)*amp+Math.sin(x*0.02+sp*1.6)*amp*.4; ctx.lineTo(x,y); }\n        ctx.lineTo(W,H); ctx.closePath();\n        ctx.fillStyle=`rgba(40,150,180,${0.06+l*0.05})`; ctx.fill();\n      }\n      for(const p of P){ p.y+=p.vy; p.x+=Math.sin(T+p.x)*.2; if(p.y<H*.44){p.y=H;p.x=Math.random()*W;}\n        ctx.globalAlpha=p.a; ctx.fillStyle='#bff0ff'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); }\n      ctx.globalAlpha=1;\n    }\n\n    else if(kind==='leaves'){\n      const g=ctx.createRadialGradient(W*.3,-40,0,W*.3,-40,H*.9); g.addColorStop(0,'rgba(180,220,120,.10)'); g.addColorStop(1,'rgba(0,0,0,0)');\n      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);\n      for(const p of P){ p.sw+=0.02; p.x+=p.vx+Math.sin(p.sw)*.6; p.y+=p.vy; p.rot+=p.vr; if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}\n        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.globalAlpha=.72; ctx.fillStyle=p.c;\n        ctx.beginPath(); ctx.ellipse(0,0,p.s,p.s*.5,0,0,6.28); ctx.fill(); ctx.restore(); }\n      ctx.globalAlpha=1;\n    }\n\n    else if(kind==='rain'||kind==='city'){\n      if(kind==='city'){\n        for(const c of this.cars){ c.x+=c.vx*dt*.06; if(c.x<-60)c.x=W+60; if(c.x>W+60)c.x=-60;\n          const g=ctx.createLinearGradient(c.x,0,c.x+c.w*(c.vx>0?1:-1),0); g.addColorStop(0,c.c); g.addColorStop(1,'rgba(0,0,0,0)');\n          ctx.globalAlpha=.5; ctx.fillStyle=g; ctx.fillRect(Math.min(c.x,c.x+c.w*(c.vx>0?1:-1)),c.y,c.w,2.4); }\n        ct :0 0 7px #ff8a2e',\n        flip:'font-weight:700',\n        dot:'letter-spacing:.1em',\n        analog:'',mech:'',\n      }[x.id]||'';\n      return {name:x.name, glyph:glyphMap[x.id], onClick:()=>this.setStyle(x.id),\n        style:`display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px 8px;border-radius:20px;background:${on?'var(--glass2)':'var(--glass)'};border:1px solid ${on?'var(--accent)':'var(--border)'};transition:transform .18s ease-out,background .3s,border-color .3s;will-change:transform`,\n        sample:`height:34px;display:flex;align-items:center;font-size:22px;color:var(--text);${sampFont}`};\n    });\n\n    const panelStyle = `position:relative;padding:clamp(20px,4vw,48px) clamp(24px,5vw,64px);filter:drop-shadow(calc(var(--mx,0px)*0.3) calc(var(--my,0px)*0.3 + 12px) 40px rgba(0,0,0,.4));transition:filter .2s ease-out`;\n\n    return {\n      setStage:(el)=>{ this.stageEl=el; },\n      setCanvas:(el)=>this.setCanvas(el),\n      setTilt:(el)=>{ this.tiltEl=el; },\n      onStageMove:(e)=>this.onStageMove(e),\n      onStageLeave:()=>this.onStageLeave(),\n      mag:(e)=>this.mag(e), magOut:(e)=>this.magOut(e),\n\n      layerAStyle:this.layerStyle('A'),\n      layerBStyle:this.layerStyle('B'),\n      vignetteStyle:`position:absolute;inset:0;z-index:3;pointer-events:none;background:radial-gradient(125% 120% at 50% 40%, transparent 50%, ${L?'rgba(20,40,55,.10)':'rgba(0,0,0,.5)'} 100%)`,\n      uiStyle:uiVars,\n      panelStyle,\n\n      clockFace:this.buildClock(),\n      dateStr,\n      styleName:(STYLES.find(x=>x.id===s.styleId)||{}).name,\n      themeName:t.name,\n      themeSwatch:t.grad,\n\n      openStyle:()=>this.setState({picker:'style'}),\n      openTheme:()=>this.setState({picker:'theme'}),\n      closePicker:()=>this.setState({picker:null}),\n      stop:(e)=>e.stopPropagation(),\n      pickerOpen: s.picker!==null,\n      showThemes: s.picker==='theme',\n      showStyles: s.picker==='style',\n      pickerTitle: s.picker==='style'?'Style d\\u2019horloge':'Thème animé',\n      themeList, styleList,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
